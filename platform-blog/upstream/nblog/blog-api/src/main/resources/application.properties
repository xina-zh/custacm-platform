server.port=${BLOG_API_PORT:8090}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${BLOG_DB_URL:jdbc:mysql://localhost:3306/custacm_blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${BLOG_DB_USERNAME:custacm_blog}
spring.datasource.password=${BLOG_DB_PASSWORD:change-me-blog-db-password}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${BLOG_REDIS_HOST:localhost}
spring.data.redis.port=${BLOG_REDIS_PORT:6379}
spring.data.redis.password=${BLOG_REDIS_PASSWORD:}
spring.data.redis.database=${BLOG_REDIS_DATABASE:0}
spring.data.redis.timeout=10000ms
blog.cache.ttl=${BLOG_CACHE_TTL:10m}

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

token.expireTime=${BLOG_TOKEN_TTL_MILLIS:259200000}
token.secretKey=${BLOG_TOKEN_SECRET:}
blog.bootstrap-admin.password=${BLOG_BOOTSTRAP_ADMIN_PASSWORD:}

logging.level.root=info
logging.level.top.naccl=info
logging.level.com.custacm.platform.trainingdata=info

# Submission collection stays off until an operator explicitly enables a job. A missing
# successful cursor triggers full history. Daily jobs overlap the previous
# successful window end by 100 hours; intraday jobs resume without overlap.
# AtCoder is offset by fifteen minutes to spread upstream and database load even
# though the scheduler permits different OJs to run in parallel. The intraday jobs skip hour zero,
# which is already covered by the daily overlap jobs.
platform.training-data.collector.job-item-interval=4s
platform.training-data.collector.schedules[0].name=codeforces-daily-one-hundred-hours
platform.training-data.collector.schedules[0].oj-name=CODEFORCES
platform.training-data.collector.schedules[0].enabled=${BLOG_CODEFORCES_DAILY_COLLECTION_ENABLED:false}
platform.training-data.collector.schedules[0].cron=0 0 0 * * *
platform.training-data.collector.schedules[0].zone=Asia/Shanghai
platform.training-data.collector.schedules[0].lookback=${BLOG_DAILY_COLLECTION_LOOKBACK:100h}
platform.training-data.collector.schedules[1].name=codeforces-half-hour-no-overlap
platform.training-data.collector.schedules[1].oj-name=CODEFORCES
platform.training-data.collector.schedules[1].enabled=${BLOG_CODEFORCES_INTRADAY_COLLECTION_ENABLED:false}
platform.training-data.collector.schedules[1].cron=0 0,30 1-23 * * *
platform.training-data.collector.schedules[1].zone=Asia/Shanghai
platform.training-data.collector.schedules[1].lookback=${BLOG_INTRADAY_COLLECTION_LOOKBACK:0h}
platform.training-data.collector.schedules[2].name=atcoder-daily-one-hundred-hours
platform.training-data.collector.schedules[2].oj-name=ATCODER
platform.training-data.collector.schedules[2].enabled=${BLOG_ATCODER_DAILY_COLLECTION_ENABLED:false}
platform.training-data.collector.schedules[2].cron=0 15 0 * * *
platform.training-data.collector.schedules[2].zone=Asia/Shanghai
platform.training-data.collector.schedules[2].lookback=${BLOG_DAILY_COLLECTION_LOOKBACK:100h}
platform.training-data.collector.schedules[3].name=atcoder-half-hour-no-overlap
platform.training-data.collector.schedules[3].oj-name=ATCODER
platform.training-data.collector.schedules[3].enabled=${BLOG_ATCODER_INTRADAY_COLLECTION_ENABLED:false}
platform.training-data.collector.schedules[3].cron=0 15,45 1-23 * * *
platform.training-data.collector.schedules[3].zone=Asia/Shanghai
platform.training-data.collector.schedules[3].lookback=${BLOG_INTRADAY_COLLECTION_LOOKBACK:0h}
platform.training-data.atcoder.problem-list-collector.enabled=${BLOG_ATCODER_PROBLEM_LIST_SCHEDULE_ENABLED:false}
platform.training-data.atcoder.problem-list-collector.bootstrap-on-startup=${BLOG_ATCODER_PROBLEM_LIST_BOOTSTRAP_ENABLED:false}

upload.file.path=${BLOG_UPLOAD_PATH:/app/upload/}
upload.file.access-path=/image/**
upload.file.resources-locations=file:${upload.file.path}
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB
image.assets.cleanup-cron=${BLOG_IMAGE_CLEANUP_CRON:0 25 3 * * *}
blog.recycle-bin.cleanup-cron=${BLOG_RECYCLE_BIN_CLEANUP_CRON:0 */15 * * * *}

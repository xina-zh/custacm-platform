server.port=${BLOG_API_PORT:8090}

blog.name=${BLOG_NAME:CustACM Blog}
blog.api=${BLOG_API_URL:http://localhost:${server.port}}
blog.cms=${BLOG_CMS_URL:http://localhost:8080}
blog.view=${BLOG_VIEW_URL:http://localhost:8081}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${BLOG_DB_URL:jdbc:mysql://localhost:3306/custacm_blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${BLOG_DB_USERNAME:custacm_blog}
spring.datasource.password=${BLOG_DB_PASSWORD:change-me-blog-db-password}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.host=${BLOG_REDIS_HOST:localhost}
spring.data.redis.port=${BLOG_REDIS_PORT:6379}
spring.data.redis.password=${BLOG_REDIS_PASSWORD:}
spring.data.redis.database=${BLOG_REDIS_DATABASE:0}
spring.data.redis.timeout=10000ms

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

token.expireTime=${BLOG_TOKEN_TTL_MILLIS:259200000}
token.secretKey=${BLOG_TOKEN_SECRET:change-me-with-at-least-sixty-four-characters-for-hs512-signing-key-2026}
blog.bootstrap-admin.password=${BLOG_BOOTSTRAP_ADMIN_PASSWORD:}

logging.level.root=info
logging.level.top.naccl=info
logging.level.com.custacm.platform.trainingdata=info

comment.notify.channel=${BLOG_COMMENT_NOTIFY_CHANNEL:mail}
comment.default-open=${BLOG_COMMENT_DEFAULT_OPEN:true}
spring.mail.host=${BLOG_MAIL_HOST:localhost}
spring.mail.port=${BLOG_MAIL_PORT:25}
spring.mail.username=${BLOG_MAIL_USERNAME:}
spring.mail.password=${BLOG_MAIL_PASSWORD:}

tg.bot.api=${BLOG_TG_API:https://api.telegram.org/bot}
tg.bot.token=${BLOG_TG_TOKEN:}
tg.bot.chat-id=${BLOG_TG_CHAT_ID:}
tg.bot.use-proxy=false
tg.bot.use-reverse-proxy=false
tg.bot.reverse-proxy-url=
http.proxy.server.host=127.0.0.1
http.proxy.server.port=7890
http.proxy.server.timeout=10000

upload.channel=local
upload.file.path=${BLOG_UPLOAD_PATH:/app/upload/}
upload.file.access-path=/image/**
upload.file.resources-locations=file:${upload.file.path}
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB
image.assets.cleanup-cron=${BLOG_IMAGE_CLEANUP_CRON:0 25 3 * * *}
upload.github.token=
upload.github.username=
upload.github.repos=
upload.github.repos-path=
upload.upyun.bucket-name=
upload.upyun.username=
upload.upyun.password=
upload.upyun.path=
upload.upyun.domain=

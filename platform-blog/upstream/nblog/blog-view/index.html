<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<meta name="color-scheme" content="light dark">
	<script>
		// Apply the shared theme before styles and Vue mount to avoid a bright first frame.
		(function () {
			var prefersDark = false
			try {
				prefersDark = Boolean(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
			} catch (_) {}
			var theme = prefersDark ? 'dark' : 'light'
			try {
				var stored = window.localStorage.getItem('custacm.theme')
				theme = stored === 'dark' || stored === 'light'
					? stored
					: theme
			} catch (_) {}
			var root = document.documentElement
			root.dataset.theme = theme
			root.classList.toggle('dark', theme === 'dark')
			root.style.colorScheme = theme
		})()
	</script>
	<link rel="icon" href="/favicon.svg" type="image/svg+xml">
	<title>custacm-platpform</title>
	<link rel="stylesheet" href="/lib/css/prism.css">
</head>
<body>
	<noscript><strong>NBlog requires JavaScript to run.</strong></noscript>
	<div id="app"></div>
	<script src="/lib/js/prism.js" data-manual></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/tocbot/4.6.0/tocbot.min.js"></script>
	<script type="module" src="/src/main.js"></script>
</body>
</html>

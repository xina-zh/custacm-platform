server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health/auth {
    proxy_pass http://custacm-backend:8081/health;
  }

  location = /health/training-data {
    proxy_pass http://custacm-training-data-web:8082/health;
  }

  location = /module-info/auth {
    proxy_pass http://custacm-backend:8081/module-info;
  }

  location = /module-info/training-data {
    proxy_pass http://custacm-training-data-web:8082/module-info;
  }

  location /api/auth/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://custacm-backend:8081/api/auth/;
  }

  location /api/training-data/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://custacm-training-data-web:8082/api/training-data/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

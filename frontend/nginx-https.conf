server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;
  client_max_body_size 18m;

  ssl_certificate /etc/nginx/tls/origin.pem;
  ssl_certificate_key /etc/nginx/tls/origin.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Content-Security-Policy "frame-ancestors 'self'" always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location ^~ /api/image/ {
    alias /srv/custacm-uploads/;

    valid_referers __CUSTACM_IMAGE_TRUSTED_REFERERS__;
    error_page 418 = @image_referer_forbidden;
    if ($invalid_referer) {
      return 418;
    }

    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  location @image_referer_forbidden {
    add_header Cache-Control "no-store, max-age=0" always;
    add_header X-Content-Type-Options "nosniff" always;
    return 403;
  }

  location ^~ /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    sub_filter_types application/json;
    sub_filter_once off;
    sub_filter "/api/image/" "__CUSTACM_IMAGE_PUBLIC_ORIGIN__/api/image/";
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://blog-api:8090;
  }

  location = /training {
    return 302 /training/multiple;
  }

  location ^~ /training-app/ {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /training-app/index.html;
  }

  location ^~ /training/ {
    root /usr/share/nginx/html/blog;
    try_files $uri $uri/ /index.html;
  }

  location / {
    root /usr/share/nginx/html/blog;
    try_files $uri $uri/ /index.html;
  }
}

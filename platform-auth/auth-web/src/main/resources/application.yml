server:
  port: ${AUTH_WEB_PORT:8081}

spring:
  application:
    name: auth-web
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/custacm_auth?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${AUTH_DB_USERNAME:custacm_auth}
    password: ${AUTH_DB_PASSWORD:change-me-auth-db-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

platform:
  auth:
    jwt:
      private-key: ${AUTH_JWT_PRIVATE_KEY:}
      private-key-path: ${AUTH_JWT_PRIVATE_KEY_PATH:}
      public-key: ${AUTH_JWT_PUBLIC_KEY:}
      public-key-path: ${AUTH_JWT_PUBLIC_KEY_PATH:}
      access-token-ttl: ${AUTH_JWT_ACCESS_TOKEN_TTL:2h}
      remember-me-access-token-ttl: ${AUTH_JWT_REMEMBER_ME_ACCESS_TOKEN_TTL:30d}
    bootstrap-admin:
      student-identity: ${AUTH_BOOTSTRAP_ADMIN_STUDENT_IDENTITY:}
      password: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:}

services:
  blog-db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${BLOG_DB_NAME}
      MYSQL_USER: ${BLOG_DB_USERNAME}
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${BLOG_DB_ROOT_PASSWORD}
    volumes:
      - blog-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  blog-redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - blog-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  blog-api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        MODULE_PATH: platform-blog/upstream/nblog/blog-api
        JAR_PATH: platform-blog/upstream/nblog/blog-api/target/blog-api-0.0.1.jar
        APP_PORT: 8090
    environment:
      BLOG_API_PORT: 8090
      BLOG_DB_URL: jdbc:mysql://blog-db:3306/${BLOG_DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      BLOG_DB_USERNAME: ${BLOG_DB_USERNAME}
      BLOG_DB_PASSWORD: ${BLOG_DB_PASSWORD}
      BLOG_REDIS_HOST: blog-redis
      BLOG_REDIS_PORT: 6379
      BLOG_TOKEN_SECRET: ${BLOG_TOKEN_SECRET}
      BLOG_TOKEN_TTL_MILLIS: ${BLOG_TOKEN_TTL_MILLIS}
      BLOG_BOOTSTRAP_ADMIN_PASSWORD: ${BLOG_BOOTSTRAP_ADMIN_PASSWORD}
      BLOG_CACHE_TTL: ${BLOG_CACHE_TTL:-10m}
      BLOG_DAILY_COLLECTION_LOOKBACK: ${BLOG_DAILY_COLLECTION_LOOKBACK:-100h}
      BLOG_INTRADAY_COLLECTION_LOOKBACK: ${BLOG_INTRADAY_COLLECTION_LOOKBACK:-0h}
      BLOG_CODEFORCES_DAILY_COLLECTION_ENABLED: ${BLOG_CODEFORCES_DAILY_COLLECTION_ENABLED:-false}
      BLOG_CODEFORCES_INTRADAY_COLLECTION_ENABLED: ${BLOG_CODEFORCES_INTRADAY_COLLECTION_ENABLED:-false}
      BLOG_ATCODER_DAILY_COLLECTION_ENABLED: ${BLOG_ATCODER_DAILY_COLLECTION_ENABLED:-false}
      BLOG_ATCODER_INTRADAY_COLLECTION_ENABLED: ${BLOG_ATCODER_INTRADAY_COLLECTION_ENABLED:-false}
      BLOG_ATCODER_PROBLEM_LIST_SCHEDULE_ENABLED: ${BLOG_ATCODER_PROBLEM_LIST_SCHEDULE_ENABLED:-false}
      BLOG_ATCODER_PROBLEM_LIST_BOOTSTRAP_ENABLED: ${BLOG_ATCODER_PROBLEM_LIST_BOOTSTRAP_ENABLED:-false}
      LOG_DIR: /app/logs
    ports:
      - "${BACKEND_PORT}:8090"
    volumes:
      - ../logs:/app/logs
      - ../uploads:/app/upload
    depends_on:
      blog-db:
        condition: service_healthy
      blog-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8090/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      TLS_ENABLED: ${TLS_ENABLED:-false}
      FRONTEND_IMAGE_REFERER_HOSTS: ${FRONTEND_IMAGE_REFERER_HOSTS:-custacm.top}
      FRONTEND_ALLOW_LOCAL_REFERERS: ${FRONTEND_ALLOW_LOCAL_REFERERS:-false}
    ports:
      - "${FRONTEND_PORT}:80"
      - "${FRONTEND_HTTPS_PORT}:443"
    volumes:
      - ../uploads:/srv/custacm-uploads:ro
      - ${TLS_CERT_DIR:-./secrets/tls}:/etc/nginx/tls:ro
    depends_on:
      blog-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  blog-db-data:
    name: ${BLOG_DB_VOLUME_NAME:-custacm-platform_blog-db-data}
  blog-redis-data:
    name: ${BLOG_REDIS_VOLUME_NAME:-custacm-platform_blog-redis-data}

server:
  port: ${TRAINING_DATA_WEB_PORT:8082}

spring:
  application:
    name: training-data-web
  datasource:
    url: ${TRAINING_DATA_DB_URL:jdbc:mysql://localhost:3306/custacm_training?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${TRAINING_DATA_DB_USERNAME:root}
    password: ${TRAINING_DATA_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

platform:
  auth:
    jwt:
      public-key: ${AUTH_JWT_PUBLIC_KEY:}
      public-key-path: ${AUTH_JWT_PUBLIC_KEY_PATH:}
  training-data:
    collector:
      job-item-interval: 4s
      schedules:
        - name: daily-recent-submissions
          oj-name: CODEFORCES
          enabled: true
          cron: "0 0 12 * * *"
          zone: Asia/Shanghai
          lookback: 120h
        - name: atcoder-daily-recent-submissions
          oj-name: ATCODER
          enabled: true
          cron: "0 15 12 * * *"
          zone: Asia/Shanghai
          lookback: 120h
    codeforces:
      collector:
        base-url: https://codeforces.com
        page-size: 1000
        connect-timeout: 10s
        read-timeout: 30s
        request-interval: 4s
        max-request-attempts: 3
    atcoder:
      collector:
        base-url: https://kenkoooo.com
        page-size: 500
        connect-timeout: 10s
        read-timeout: 30s
        request-interval: 2s
        max-request-attempts: 3
      problem-list-collector:
        enabled: true
        bootstrap-on-startup: true
        bootstrap-only-when-empty: true
        cron: "0 30 3 1/3 * ?"
        zone: Asia/Shanghai
